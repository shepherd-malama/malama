<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Malama+ Tech Products</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    h2 {
      text-align: center;
      color: gold;
      text-shadow: 0 0 10px gold, 0 0 20px #ffcc00;
      margin-bottom: 20px;
    }

    /* Filter Bar */
    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    .filter-btn {
      padding: 10px 20px;
      background: rgba(255, 215, 0, 0.1);
      border: 2px solid gold;
      border-radius: 25px;
      color: gold;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .filter-btn:hover {
      background: gold;
      color: #111;
      transform: scale(1.1);
    }

    .filter-btn.active {
      background: gold;
      color: #111;
      box-shadow: 0 0 15px gold, 0 0 30px #ffcc00;
    }

    /* Gallery Grid */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: auto;
    }

    .gallery img {
      width: 100%;
      border-radius: 12px;
      border: 2px solid gold;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
      transition: transform 0.3s ease;
    }

    .gallery img:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.7);
    }

    .gallery-item {
      display: none; /* hidden by default */
    }

    .gallery-item.show {
      display: block;
    }
  </style>
</head>
<body>

  <h2>✨ Malama+ Tech Products ✨</h2>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterGallery('all')">All Products</button>
    <button class="filter-btn" onclick="filterGallery('apple')">Apple</button>
    <button class="filter-btn" onclick="filterGallery('laptop')">Laptops</button>
    <button class="filter-btn" onclick="filterGallery('pixel')">Google Pixel</button>
  </div>

  <!-- Gallery -->
  <div class="gallery">
    <div class="gallery-item apple show"><img src="Apple7.jpeg" alt="Apple iPhone"></div>
    <div class="gallery-item apple show"><img src="Apple6.jpeg" alt="Apple MacBook"></div>
    <div class="gallery-item laptop show"><img src="lpp14.jpeg" alt="Laptop"></div>
    <div class="gallery-item laptop show"><img src="lpp15.jpeg" alt="Gaming Laptop"></div>
    <div class="gallery-item pixel show"><img src="pixel12.jpeg" alt="Google Pixel"></div>
    <div class="gallery-item pixel show"><img src="pixel11.jpeg" alt="Google Pixel Tablet"></div>
  </div>

  <script>
    function filterGallery(category) {
      const items = document.querySelectorAll('.gallery-item');
      const buttons = document.querySelectorAll('.filter-btn');

      // Reset active button
      buttons.forEach(btn => btn.classList.remove('active'));

      // Highlight clicked button
      event.target.classList.add('active');

      items.forEach(item => {
        if (category === 'all') {
          item.classList.add('show');
        } else {
          item.classList.remove('show');
          if (item.classList.contains(category)) {
            item.classList.add('show');
          }
        }
      });
    }
  </script>

</body>
</html>
