   <style>
.top-right {
  width: 190px;
  height: 190px;
  border-radius: 50%;        /* full circle shape */
  background-color: #FFFFFF; /* white background */
  object-fit: cover;         /* ensures image fills the circle neatly */
  position: absolute;
  top: 20px;
  right: 20px;               /* positions image at top-right corner */
  border: 5px solid transparent; /* base border transparent */
  background-image: linear-gradient(#FFFFFF, #FFFFFF), 
                    linear-gradient(90deg, #36454F, #000000, #36454F); /* gradient ring */
  background-origin: border-box;
  background-clip: content-box, border-box;
  box-shadow: 0 0 15px rgba(54,69,79,0.6); /* subtle glow */
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  cursor: pointer;
  overflow: hidden;
  animation: borderflow 4s linear infinite; /* flowing gradient animation */
}

.top-right:hover {
  transform: scale(1.08); /* gentle pulse zoom */
  box-shadow: 0 0 25px rgba(54,69,79,0.9); /* brighter glow on hover */
}

/* Ripple effect */
.top-right:active::after {
  content: "";
  position: absolute;
  border-radius: 50%;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  background: rgba(54,69,79,0.4); /* charcoal ripple */
  animation: ripple 0.6s ease-out;
}

.top-right:active {
  animation: rotate 0.6s ease-out; /* smooth spin on click */
}

@keyframes ripple {
  from {
    transform: scale(0);
    opacity: 0.8;
  }
  to {
    transform: scale(2);
    opacity: 0;
  }
}

@keyframes rotate {
  from {
    transform: rotate(0deg) scale(1.08);
  }
  to {
    transform: rotate(360deg) scale(1.08);
  }
}

@keyframes borderflow {
  0% {
    background-image: linear-gradient(#FFFFFF, #FFFFFF), 
                      linear-gradient(90deg, #36454F, #000000, #36454F);
  }
  100% {
    background-image: linear-gradient(#FFFFFF, #FFFFFF), 
                      linear-gradient(450deg, #36454F, #000000, #36454F);
  }
}
</style>
